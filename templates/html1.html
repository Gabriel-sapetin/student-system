<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css1.css') }}">
    <link rel="icon" type="image/png" href="Screenshot-2025-05-27-172119.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<script>
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("active");
}
</script>
<body>
    <!-- TOP NAVIGATION BAR -->
<nav class="top-navbar">

    <!-- LEFT SIDE (HAMBURGER MENU) -->
    <div class="nav-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
    </div>

    <!-- RIGHT SIDE (NAV ICONS) -->
    <div class="nav-right">
        <button class="nav-icon" onclick="goHome()">H</button>
        <button class="nav-icon" onclick="showAbout()">A</button>
        <button class="nav-icon" onclick="showContact()">C</button>
    </div>

</nav>

<!-- SIDEBAR MENU -->
<div id="sidebar" class="sidebar">

    <h3>Menu</h3>

    <button onclick="#">Home</button>
    <button onclick="showAbout()">About Us</button>
    <button onclick="showContact()">Contact</button>

</div>
    <div class="container">
        <header>
            <h1>Student Management System</h1>
            <p>ORDINAL APPLICATIONS</p>
        </header>

        <main class="main-content">
            <section id="studentSection" class="active">
                <div class="input-group">
                    <input type="text" id="studentName" placeholder="Enter student name..." maxlength="50">
                    <button id="addStudentBtn">Add Student</button>
                    <button id="endStudentsBtn">INPUT PROGRAM</button>
                </div>
                <div id="currentStudents" class="students-list">
                    <h3>Current Students:</h3>
                    <ul id="studentsList"></ul>
                </div>
            </section>

            <section id="programSection" class="hidden">
                <div class="input-group">
                    <input type="text" id="programName" placeholder="Enter program (e.g., BSCS)..." maxlength="10">
                    <button id="submitProgramBtn">➤ Next: Year Level</button>
                </div>
            </section>

            <section id="yearSection" class="hidden">
                <div class="input-group">
                    <select id="yearLevel">
                        <option value="">Select Year Level</option>
                        <option value="1st">1st Year</option>
                        <option value="2nd">2nd Year</option>
                        <option value="3rd">3rd Year</option>
                        <option value="4th">4th Year</option>
                    </select>
                    <button id="submitYearBtn">✅ Save Student/s</button>
                    <button id="backToStudentsBtn">↩️ New Students</button>
                </div>
            </section>

            <section id="resultsSection" class="hidden">
                <button id="backToMainBtn">🔄 Add Another Group</button>
            </section>
        </main>

<section id="resultsDisplay" class="results-container hidden">
<h2 class="dashboard-title">DASHBOARD</h2>    
<div class="stats-grid">
    <div class="stat-card">
        <h3 id="totalPrograms">0</h3>
        <p>Programs</p>
    </div>

    <div class="stat-card">
        <h3 id="totalStudents">0</h3>
        <p>Students</p>
    </div>

    <div class="stat-card">
        <h3 id="totalYears">4</h3>
        <p>Year Levels</p>
    </div>
</div>
    <div class="chart-container">
    <canvas id="yearChart"></canvas>
    </div>
    <div class="chart-container">
    <canvas id="programChart"></canvas>
    </div>
    <div class="results-controls modern-controls">
    <input type="text" id="searchInput" placeholder="Search program or year...">
    
    <select id="sortSelect">
        <option value="default">Sort By</option>
        <option value="year">Year Level</option>
        <option value="students">Student Count</option>
    </select>
    <button onclick="exportCSV()">Download File</button>
</div>

    <div id="groupsList"></div>
</section>

    <script>
        let currentStudents = [];
        let tempProgram = '';
        let tempYear = '';

        document.getElementById('studentName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addStudent();
        });

        document.getElementById('addStudentBtn').addEventListener('click', addStudent);
        document.getElementById('endStudentsBtn').addEventListener('click', endStudents);
        document.getElementById('programName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') submitProgram();
        });
        document.getElementById('submitProgramBtn').addEventListener('click', submitProgram);
        document.getElementById('yearLevel').addEventListener('change', function() {
            document.getElementById('submitYearBtn').disabled = !this.value;
        });
        document.getElementById('submitYearBtn').addEventListener('click', submitYear);
        document.getElementById('backToStudentsBtn').addEventListener('click', resetToStudents);
        document.getElementById('backToMainBtn').addEventListener('click', resetToStudents);

function toggleSidebar(){
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}

function goHome(){
    window.scrollTo({top:0,behavior:"smooth"});
}

function showAbout(){
    alert("Student Management System\nCreated for organizing students by program and year.");
}

function showContact(){
    alert("Contact:\nEmail: support@studentsystem.com");
}

        function exportCSV(){

fetch('/get_groups')
.then(res=>res.json())
.then(data=>{

let rows = [["Program","Year","Student"]];

data.groups.forEach(g=>{
    g.students.forEach(s=>{
        rows.push([g.program,g.year,s]);
    });
});

let csv = rows.map(r=>r.join(",")).join("\n");

const blob = new Blob([csv],{type:"text/csv"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "students.csv";
a.click();

});

}
        function addStudent() {

            const name = document.getElementById('studentName').value.trim();
            const regex = /^[A-Za-z .'-]{2,50}$/;

            if(!regex.test(name)){
                showToast("Invalid name format.");
                return;
            }

            if (name && !currentStudents.includes(name)) {
                currentStudents.push(name);
                updateStudentsList();
                document.getElementById('studentName').value = '';
                document.getElementById('studentName').focus();
                showToast("Student added");
        }
    }

        function endStudents() {

    if (currentStudents.length === 0) {
        showToast("Please add at least one student first!");
        return;
    }

    document.getElementById('programName').focus();
    showSection('programSection');
}

        function submitProgram() {
            tempProgram = document.getElementById('programName').value.trim().toUpperCase();
            if (tempProgram) {
                showSection('yearSection');
            } else {
                showToast('Please enter a program name!');
            }
        }

        function submitYear() {
            const year = document.getElementById('yearLevel').value;
            if (year && currentStudents.length > 0) {
        
                fetch('/save_group', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        program: tempProgram,
                        year: year,
                        students: currentStudents
                    })
                }).then(() => {
            currentStudents = [];
            showToast("Students saved successfully");
            resetToStudents();
            loadResults();   
                });
            }
        }

        function resetToStudents() {
            currentStudents = [];
            tempProgram = '';
            document.getElementById('yearLevel').value = '';
            document.getElementById('programName').value = '';
            document.getElementById('studentName').value = '';
            updateStudentsList();
            showSection('studentSection');
            loadResults();
        }

        function showSection(sectionId) {
            document.querySelectorAll('.main-content > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.main-content > section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.remove('hidden');
            document.getElementById(sectionId).classList.add('active');
        }

        function updateStudentsList() {
            const list = document.getElementById('studentsList');
            list.innerHTML = currentStudents.map(name => `<li>${name}</li>`).join('');
        }

        function deleteGroup(program, year, buttonElement) {
    if (!confirm(`Delete ${program} - ${year}?`)) return;

    const card = buttonElement.closest('.program-card-modern');
    card.style.opacity = '0';
    card.style.transform = 'scale(0.9)';

    setTimeout(() => {
        fetch('/delete_group', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ program, year })
        }).then(() => loadResults());
    }, 250);
}


        function showResults() {
            showSection('resultsSection');
            loadResults();
        }

document.addEventListener("DOMContentLoaded", function() {
document.getElementById("searchInput").addEventListener("input", loadResults);
document.getElementById("sortSelect").addEventListener("change", loadResults);

});

function loadResults() {
    const searchValue = document.getElementById("searchInput")?.value.toLowerCase() || "";

    fetch('/get_groups')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('groupsList');

            if (!data.groups || data.groups.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:40px;color:#777;">
                        <h3>No groups yet</h3>
                        <p>Start by adding students above.</p>
                    </div>`;
                document.getElementById('resultsDisplay').classList.remove('hidden');
                return;
            }

            // Filter groups
            const filteredGroups = data.groups.filter(g =>
                g.program.toLowerCase().includes(searchValue) ||
                g.year.toLowerCase().includes(searchValue) ||
                g.students.some(s => s.toLowerCase().includes(searchValue))
            );

            // Group by program
            const groupedByProgram = {};
            filteredGroups.forEach(group => {
                if (!groupedByProgram[group.program]) groupedByProgram[group.program] = [];
                groupedByProgram[group.program].push(group);
            });

            // Stats
            const totalStudents = filteredGroups.reduce((sum, g) => sum + g.students.length, 0);
            document.getElementById("totalPrograms").innerText =
Object.keys(groupedByProgram).length;

document.getElementById("totalStudents").innerText =
totalStudents;

            // Year chart
            const yearCounts = { "1st": 0, "2nd": 0, "3rd": 0, "4th": 0 };
            filteredGroups.forEach(g => { yearCounts[g.year] += g.students.length });
            const yearValues = Object.values(yearCounts);
            const maxCount = Math.max(...yearValues);
            const colors = yearValues.map(count => 
    count === maxCount 
        ? '#ff6b6b'  // highlight color for most populated year
        : '#667eea'   // default color
);

            const ctx = document.getElementById('yearChart').getContext('2d');

            // Destroy old chart safely
            if (window.yearChart && typeof window.yearChart.destroy === 'function') {
                window.yearChart.destroy();
            }

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, "#667eea");
            gradient.addColorStop(1, "#764ba2");

            window.yearChart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ["1st Year", "2nd Year", "3rd Year", "4th Year"],
        datasets: [{
            data: Object.values(yearCounts),
            backgroundColor: colors,
            borderRadius: 12,
            borderSkipped: false,
            barThickness: 30
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false },
            tooltip: {
                callbacks: {
                    label: function(context) {
                        const yearLabel = context.label;
                        const count = context.raw;
                        return `${yearLabel}: ${count} student${count !== 1 ? 's' : ''}`;
                    }
                }
            }
        },
        scales: {
            y: { beginAtZero: true, ticks: { precision:0 } }
        }
    }
});

// Prepare program data
const programLabels = Object.keys(groupedByProgram);
const programCounts = programLabels.map(p => groupedByProgram[p].reduce((sum,g)=>sum+g.students.length,0));

// Pie chart
const ctxProg = document.getElementById('programChart').getContext('2d');

if (window.programChart && typeof window.programChart.destroy === 'function') {
    window.programChart.destroy();
}

window.programChart = new Chart(ctxProg, {
    type: 'pie',
    data: {
        labels: programLabels,
        datasets: [{
            data: programCounts,
            backgroundColor: programLabels.map((_,i)=>`hsl(${i*60 % 360}, 70%, 60%)`)
        }]
    },
    options: {
        responsive: true,
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(context){
                        const prog = context.label;
                        const count = context.raw;
                        const total = programCounts.reduce((a,b)=>a+b,0);
                        const percent = ((count/total)*100).toFixed(1);
                        return `${prog}: ${count} students (${percent}%)`;
                    }
                }
            },
            legend: {
                position: 'bottom',
                labels: { color: '#333' }
            }
        }
    }
});

            // Program cards
            const programsArray = Object.keys(groupedByProgram).map(program => {
    const yearLevels = groupedByProgram[program].length;
    const totalStudents = groupedByProgram[program].reduce((sum, g) => sum + g.students.length, 0);
    return { program, yearLevels, totalStudents };
});

// Sort descending by total students
programsArray.sort((a, b) => b.totalStudents - a.totalStudents);

container.innerHTML = programsArray.map(p => `
    <div class="program-card-modern">
        <div class="program-card-left" onclick="openProgram('${encodeURIComponent(p.program)}')">
            <h2>${p.program}</h2>
            <p>${p.yearLevels} Year Levels</p>
        </div>
        <div class="program-card-right">
            <div class="badge students-badge">${p.totalStudents} Students</div>
            <button class="delete-btn" onclick="deleteGroup('${p.program}','',this)">X</button>
        </div>
    </div>
`).join('');

            document.getElementById('resultsDisplay').classList.remove('hidden');
        })
        .catch(err => {
            console.error("Error loading groups:", err);
            showToast("Failed to load groups. Check console for errors.");
        });
}               

function openProgram(programName) {
    fetch('/get_groups')
        .then(res => res.json())
        .then(data => {

            const programGroups = data.groups.filter(g => g.program === programName);
            let yearMap = {};
programGroups.forEach(g => {
    yearMap[g.year] = g.students;
});

// Convert to array to sort by student count descending
const yearArray = Object.keys(yearMap).map(y => ({ year: y, students: yearMap[y] }));
yearArray.sort((a, b) => b.students.length - a.students.length);

const container = document.getElementById('groupsList');

container.innerHTML = `
    <div class="program-view">
        <div class="program-header">
            <button class="back-btn" onclick="loadResults()">← Back</button>
            <h2>${programName}</h2>
        </div>

        <div class="year-grid">
            ${yearArray.map(yObj => `
                <div class="year-card">
                    <h3>${yObj.year} Year (${yObj.students.length})</h3>
                    <ul>
                    ${yObj.students.map(s => `
<li class="student-item">
    ${s}
    <div>
        <button class="student-edit"
onclick="editStudent('${programName}','${yObj.year}','${s}')">EDIT</button>
        <button class="student-delete"
        onclick="removeStudent('${programName}','${yObj.year}','${s}')">X</button>
    </div>
</li>
`).join('')}
                    </ul>
                </div>
            `).join('')}
        </div>
    </div>
`;
        });
}

function editStudent(program, year, student){
    const newName = prompt("Edit student name:", student);

    if(!newName || newName.trim() === "") return;

    fetch('/edit_student', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            program,
            year,
            old_name: student,
            new_name: newName
        })
    }).then(()=>openProgram(program));
}

function showToast(msg){
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = msg;

    document.body.appendChild(toast);

    setTimeout(()=>{
        toast.classList.add("show");
    },10);

    setTimeout(()=>{
        toast.remove();
    },3000);
}

function removeStudent(program, year, student) {

    if (!confirm(`Remove ${student}?`)) return;

    fetch('/remove_student', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            program: program,
            year: year,
            student: student
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "removed") {
            loadResults(); 
            showToast("Student removed");
            setTimeout(() => openProgram(program), 100);
        } else {
            showToast("Student not found.");
        }

    });
}

// Loa results ONCE on page load
loadResults();

    </script>
</body>
</html>
